version: "3.1"

intents:
  - greet
  - request_operator
  - ask_enroll

entities:
  - discipline
  - grade
  - location

slots:
  discipline:
    type: text
    mappings:
      - type: from_entity
        entity: discipline
  grade:
    type: text
    mappings:
      - type: from_entity
        entity: grade
  location:
    type: text
    mappings:
      - type: from_entity
        entity: location

responses:
  utter_greet:
    - text: "Здравствуйте! Я виртуальный помощник клуба «Фрактал». Могу помочь с расписанием или записью на предмет."

  utter_transfer:
    - text: "Переключаю вас на администратора. Пожалуйста, подождите."

  utter_ask_enroll:
    - text: "Отлично! Какой предмет вас интересует и в каком классе учится ребенок?"

