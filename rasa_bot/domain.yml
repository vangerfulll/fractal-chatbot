version: "3.1"

intents:
  - greet
  - request_operator
  - ask_enroll
  - ask_faq_camps

entities:
  - discipline
  - grade
  - location

slots:
  discipline:
    type: text
    mappings:
      - type: from_entity
        entity: discipline
  grade:
    type: text
    mappings:
      - type: from_entity
        entity: grade
  location:
    type: text
    mappings:
      - type: from_entity
        entity: location

responses:
  utter_greet:
    - text: "Здравствуйте! Я виртуальный помощник клуба «Фрактал». Могу помочь с расписанием, записью на предмет или рассказать про лагеря."

  utter_transfer:
    - text: "Переключаю вас на администратора. Пожалуйста, подождите."

  utter_ask_enroll:
    - text: "Отлично! Какой предмет вас интересует и в каком классе учится ребенок?"

  utter_faq_camps:
    - text: "У нас проходят городские и выездные лагеря. Подробности можно посмотреть на сайте в разделе лагерей."
