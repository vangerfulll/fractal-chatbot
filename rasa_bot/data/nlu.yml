version: "3.1"

nlu:
- intent: greet
  examples: |
    - привет
    - здравствуйте
    - добрый день
    - доброе утро
    - добрый вечер
    - привет бот
    - алло

- intent: request_operator
  examples: |
    - позови человека
    - позовите человека
    - нужен оператор
    - свяжите с менеджером
    - дайте администратора
    - человек
    - хочу поговорить с живым человеком
    - переключи на оператора
    - менеджер
    - кто-то живой тут есть?
    - ничего не понятно, дайте человека

- intent: ask_enroll
  examples: |
    - хочу записаться
    - хочу записать ребенка
    - запишите нас на кружок
    - хочу записаться на кружок
    - хотим на кружок
    - как попасть на кружок
    - какие есть группы?
    - как записаться на занятия?
    - как попасть в группу?
    - интересует запись в кружок
    - хотим поступить к вам
    - какие есть группы для записи?
    - как устроить ребенка к вам
    - запишите нас на [математику](discipline)
    - запишите в кружок [программирования](discipline) для [второго](grade) класса
    - ищу кружок по [физике](discipline)
    - мы в [3 классе](grade), хотим к вам на [олимпиадную математику](discipline)
    - как устроить ребенка на [кружок по математике](discipline)
    - интересует кружок по [физике](discipline) для [семиклассника](grade)
    - хотим заниматься [олимпиадным программированием](discipline)
    - запишите нас в [4 класс](grade)
    - запись на [математику](discipline)

- intent: ask_faq_camps
  examples: |
    - какие лагеря у вас есть?
    - расскажите про выездные смены
    - когда городской лагерь
    - есть ли варианты летнего лагеря
    - лагерь на лето
    - весенний лагерь
    - скажите когда будет выезд в лагерь
    - лагеря
    - хочу узнать про смены в лагерях

- lookup: discipline
  examples: |
    - математика
    - олимпиадная математика
    - физика
    - программирование
    - олимпиадное программирование

- lookup: grade
  examples: |
    - 1 класс
    - 2 класс
    - 3 класс
    - 4 класс
    - 5 класс
    - 6 класс
    - 7 класс
    - 8 класс
    - 9 класс

- lookup: location
  examples: |
    - онлайн
    - Петроградская
    - Василеостровская
